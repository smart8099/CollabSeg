mode: ensemble
ensemble_config: configs/ensemble/anchor_unetv2.yaml
split_csv: datasets/agentpolyp_2504/unified_split/manifests/val.csv
root_dir: datasets/agentpolyp_2504/unified_split
device: cuda
batch_size: 8
metric: selector_dice
maximize: true
output_dir: outputs/selector_tuning_anchor_round3

normalize_groups:
  - [
      scoring.policy.anchor.trust_weights.confidence,
      scoring.policy.anchor.trust_weights.agreement,
      scoring.policy.anchor.trust_weights.shape,
      scoring.policy.anchor.trust_weights.boundary,
    ]

search:
  include_baseline: true
  num_trials: 16
  random_seed: 44
  parameters:
    trust_confidence:
      path: scoring.policy.anchor.trust_weights.confidence
      values: [0.25, 0.30, 0.35]
    trust_agreement:
      path: scoring.policy.anchor.trust_weights.agreement
      values: [0.10, 0.15]
    trust_shape:
      path: scoring.policy.anchor.trust_weights.shape
      values: [0.30, 0.35, 0.40]
    trust_boundary:
      path: scoring.policy.anchor.trust_weights.boundary
      values: [0.20, 0.25]
